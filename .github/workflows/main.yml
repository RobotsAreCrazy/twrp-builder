name: OrangeFox - Build Galaxy Tab A9+

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maximize Server Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc || true
        sudo apt-get clean

    - name: Install Compiling Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop rsync unzip zip python3

    - name: Set Up Google Repo Command Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configure Git Credentials
      run: |
        git config --global user.name "RobotsAreCrazy"
        git config --global user.email "robotsarecrazy@github.com"
        git config --global color.ui false

    - name: Sync Open Source Manifest Base
      run: |
        mkdir ~/orangefox
        cd ~/orangefox
        export REPO_URL='https://storage.googleapis.com/git-repo-downloads/repo'
        repo init --depth=1 --no-repo-verify -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Cellular Tab A9+ Device Tree
      run: |
        cd ~/orangefox
        git clone --depth=1 -b twrp-12.1 https://github.com/cdpcrp/custom_recovery_tree_samsung_gta9p.git device/samsung/gta9p

    - name: Compile Custom Recovery Image
      run: |
        cd ~/orangefox
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_gta9p-eng || lunch twrp_gta9p-userdebug
        mka recoveryimage -j$(nproc --all)

    - name: Package Output Artifact
      run: |
        cd ~/orangefox/out/target/product/gta9p
        zip -r OrangeFox-gta9p-Built.zip recovery.img || echo "No direct recovery.img file found"

    - name: Upload Finished Recovery File
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-gta9p-Recovery
        path: ~/orangefox/out/target/product/gta9p/OrangeFox-gta9p-Built.zip
