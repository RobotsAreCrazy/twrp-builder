name: OrangeFox - Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch (e.g., OrangeFox-12.1)'
        required: true
        default: 'OrangeFox-12.1'
      DEVICE_TREE_URL:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/cdpcrp/custom_recovery_tree_samsung_gta9p.git'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device Path (e.g., device/samsung/gta9p)'
        required: true
        default: 'device/samsung/gta9p'
      DEVICE_NAME:
        description: 'Device Name (Codename)'
        required: true
        default: 'gta9p'
      MAKEFILE_NAME:
        description: 'Makefile Name (e.g., twrp_gta9p)'
        required: true
        default: 'twrp_gta9p'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clean Up Server Space
      run: |
        docker rmi $(docker images -q) || true
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android || true
        sudo apt-get clean

    - name: Install Compilation Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Environment Variables
      run: |
        git config --global user.name "RobotsAreCrazy"
        git config --global user.email "robotsarecrazy@github.com"

    - name: Sync Minimal Manifest Source
      run: |
        mkdir ~/orangefox
        cd ~/orangefox
        repo init --depth=1 -u https://github.com/OrangeFoxRecovery/Manifest.git -b 12.1

    - name: Clone Galaxy Tab A9+ Device Tree
      run: |
        cd ~/orangefox
        git clone --depth=1 -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ${{ github.event.inputs.DEVICE_TREE_URL }} ~/orangefox/${{ github.event.inputs.DEVICE_PATH }}

    - name: Execute Cloud Compiler Build
      run: |
        cd ~/orangefox
        source build/envsetup.sh
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng || lunch ${{ github.event.inputs.MAKEFILE_NAME }}-userdebug
        mka ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Package Recovery Output Artifacts
      run: |
        cd ~/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}
        zip -r OrangeFox-12.1-gta9p-Build.zip recovery.img || zip -r OrangeFox-12.1-gta9p-Build.zip boot.img

    - name: Upload Finished Recovery Zip
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-Built-Recovery
        path: ~/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox-12.1-gta9p-Build.zip
